<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Juggling Simulator Demo</title>
    <style>
      body {
        margin: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        color: white;
      }
      canvas {
        border-radius: 12px;
      }
      .controls {
        margin-top: 16px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      input {
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid #444;
        background: #222;
        color: white;
        font-size: 18px;
        width: 120px;
        text-align: center;
      }
      button {
        padding: 8px 16px;
        border-radius: 8px;
        border: none;
        background: #3b82f6;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }
      button:hover {
        background: #2563eb;
      }
    </style>
  </head>
  <body>
    <canvas id="juggler" width="400" height="550"></canvas>
    <div class="controls">
      <input id="siteswap" type="text" value="3" placeholder="Siteswap" />
      <button id="go">Go</button>
    </div>
    <script type="module">
      import { createSimulator } from "./dist/index.js";

      const canvas = document.getElementById("juggler");
      const input = document.getElementById("siteswap");
      const btn = document.getElementById("go");

      const sim = createSimulator(canvas, { siteswap: input.value });
      sim.start();

      btn.addEventListener("click", () => {
        try {
          sim.setSiteswap(input.value);
        } catch (e) {
          alert(e.message);
        }
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") btn.click();
      });
    </script>
  </body>
</html>

pre-push:
  commands:
    changeset-check:
      run: bunx changeset status --since=origin/main

pre-commit:
  parallel: true
  commands:
    lint-web:
      glob: "web/src/**/*.{ts,tsx}"
      run: bunx eslint --fix {staged_files}
      stage_fixed: true
    lint-server:
      glob: "server/src/**/*.ts"
      run: bunx eslint --fix {staged_files}
      stage_fixed: true
    format-js:
      glob: "**/*.{ts,tsx,js,json,md}"
      exclude: "engine/**"
      run: bunx prettier --write {staged_files}
      stage_fixed: true
    format-rust:
      glob: "engine/**/*.rs"
      root: engine/
      run: cargo fmt
      stage_fixed: true
